---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%Y-%m-%d' }}</time></p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/' | relative_url }}">&larr; back to home</a></p>
</article>
