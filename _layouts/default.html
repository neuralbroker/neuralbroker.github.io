<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Abdulla Sajad" }}</title>
    <meta name="description" content="{{ page.description | default: "Software engineer building things that work." }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
    <link rel="alternate" type="application/rss+xml" title="Abdulla Sajad" href="/feed.xml">
    <script>
        (function () {
            var t = localStorage.getItem("theme");
            if (t === "dark" || (t !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.dataset.theme = "dark";
            }
        })();
    </script>
</head>
<body>
    {% include header.html %}
    <main id="main">{{ content }}</main>
    {% include footer.html %}
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
            fontFamily: '"JetBrains Mono Nerd Font", "JetBrains Mono", monospace',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            themeVariables: {
                fontSize: '13px'
            }
        });
        // Re-run mermaid on theme change
        document.querySelector('.theme-toggle')?.addEventListener('click', function() {
            setTimeout(function() {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
                    fontFamily: '"JetBrains Mono Nerd Font", "JetBrains Mono", monospace',
                    flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
                });
                document.querySelectorAll('.mermaid').forEach(function(el) {
                    el.removeAttribute('data-processed');
                });
                mermaid.run();
            }, 100);
        });
        mermaid.run();
    </script>
</body>
</html>
