<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} &middot; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3EA%3C/text%3E%3C/svg%3E">
    <link rel="preload" href="{{ '/assets/fonts/JetBrainsMonoNerdFont-Regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/JetBrainsMonoNerdFont-Medium.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">Abdulla Sajad</a></h1>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}#about">about</a>
          <a href="{{ '/' | relative_url }}#projects">projects</a>
          <a href="{{ '/' | relative_url }}#writing">writing</a>
          <a href="{{ '/' | relative_url }}#notes">notes</a>
          <a href="{{ '/resume.pdf' | relative_url }}">cv</a>
          <button class="theme-toggle" type="button" aria-label="Toggle theme"></button>
        </nav>
      </header>
      {{ content }}
      <footer class="site-footer">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}</p>
      </footer>
    </main>
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark') document.documentElement.classList.add('dark');
        var btn = document.querySelector('.theme-toggle');
        if (btn) {
          btn.addEventListener('click', function() {
            var d = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', d ? 'dark' : 'light');
          });
        }
      })();
    </script>
  </body>
</html>
